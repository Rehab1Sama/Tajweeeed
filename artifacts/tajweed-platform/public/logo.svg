<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      .teal { fill: #0d6b6b; }
      .gold { fill: #c8972a; stroke: #c8972a; stroke-width: 2; stroke-linejoin: round; }
      .ivory { fill: #fdf8f0; }
    </style>
  </defs>
  <circle cx="50" cy="50" r="48" class="teal" />
  <!-- 8 pointed star outer -->
  <polygon points="50,10 60,35 85,35 65,55 75,80 50,65 25,80 35,55 15,35 40,35" class="gold" fill="none" />
  <!-- 8 pointed star inner rotated -->
  <polygon points="50,18 58,40 80,40 62,56 70,78 50,65 30,78 38,56 20,40 42,40" class="gold" fill="none" transform="rotate(45 50 50)" />
  <!-- Center elements -->
  <circle cx="50" cy="50" r="15" class="gold" />
  <circle cx="50" cy="50" r="12" class="teal" />
  <circle cx="50" cy="50" r="4" class="ivory" />
</svg>